worker_processes auto;

events {
    worker_connections 2048;
}

http {
    keepalive_timeout 75s;
    keepalive_requests 1000;

    proxy_http_version 1.1;
    proxy_set_header Connection "";

    upstream masters {
        server master:8000;
        server master-standby:8000 backup;
    }

    server {
        listen 3000;
        location / {
            proxy_pass http://masters/;
        }
    }
}
