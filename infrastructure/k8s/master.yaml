# ==============================================================================
# Primary Master — Deployment + PVC + Service
# ==============================================================================
# The primary master handles all write traffic and syncs state to the standby.
# MASTER_IMAGE is substituted with the real ECR URL by `make deploy`.
# ==============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: master
  namespace: cache
  labels:
    app: master
    role: primary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: master
      role: primary
  template:
    metadata:
      labels:
        app: master
        role: primary
    spec:
      containers:
        - name: master
          image: MASTER_IMAGE  # replaced by `make deploy`
          ports:
            - containerPort: 8000
          env:
            - name: ROLE
              value: "primary"
            - name: PORT
              value: "8000"
            # Tell the primary where to find its standby for replication.
            - name: STANDBY_SERVER
              value: "master-standby:8000"
            - name: AUX_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: cache-config
                  key: AUX_SERVERS
            - name: REPLICATION_FACTOR
              valueFrom:
                configMapKeyRef:
                  name: cache-config
                  key: REPLICATION_FACTOR
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: master-data

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: master-data
  namespace: cache
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ebs-gp3
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: master
  namespace: cache
  labels:
    app: master
    role: primary
spec:
  type: ClusterIP
  selector:
    app: master
    role: primary
  ports:
    - name: http
      port: 8000
      targetPort: 8000
